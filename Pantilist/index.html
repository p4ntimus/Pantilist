<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantilist</title>

  <!-- PWA -->
  <meta name="theme-color" content="#ffe9f5" id="theme-color-meta">
  <link rel="manifest" href="manifest.json">

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/img/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="assets/img/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="assets/img/icon-512.png">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- Themes -->
  <link id="theme-default" rel="stylesheet" href="assets/css/themes/theme-default.css">
  <link id="theme-forest" rel="stylesheet" href="assets/css/themes/theme-forest.css" disabled>
  <link id="theme-diablo" rel="stylesheet" href="assets/css/themes/theme-diablo.css" disabled>
  <link id="theme-blackfantasy" rel="stylesheet" href="assets/css/themes/theme-blackfantasy.css" disabled>
  <link id="theme-unicorn" rel="stylesheet" href="assets/css/themes/theme-unicorn.css" disabled>
  <link id="theme-coreblue" rel="stylesheet" href="assets/css/themes/theme-coreblue.css" disabled>

</head>

<body class="size-normal">

  <!-- HEADER -->
  <header class="app-header card">
    <div class="header-left">
      <select id="listSelect" class="list-select" aria-label="Liste auswählen"></select>
      <button id="addListBtn" class="add-list-btn" aria-label="Neue Liste hinzufügen">+</button>
    </div>
    <div class="header-right">
      <div class="title-row">
        <h1>Pantilist</h1>
        <button class="settings-btn icon-btn" aria-label="Einstellungen">⚙️</button>
      </div>
      <span class="subtitle">Dein smarter Einkaufshelfer</span>
    </div>
  </header>
    
      
    
    


  <main>

    <!-- KATEGORIEN (TABS) -->
    <section class="category-tabs card">
        <div id="categoryTabs" class="tabs-container"></div>
    </section>

    <!-- FAVORITEN -->
    <section class="favorites-section card">
      <span class="favorites-label">Favoriten</span>
      <div id="favoritesMain" class="favorites-buttons"></div>
    </section>

    <!-- EINGABE -->
    <section class="input-section card">
      <div class="input-row">
        <input id="itemInput" placeholder="Artikel eingeben…">
        <button class="add-btn">+</button>
      </div>
    </section>

    <!-- SUCHE -->
    <section class="search-section card">
      <input id="searchInput" placeholder="Liste durchsuchen…">
    </section>

    <!-- LISTE -->
    <section class="list-section card">
      <ul id="list"></ul>
    </section>

  </main>

  <div id="itemActionBackdrop" class="item-action-backdrop" hidden></div>
  <div id="itemActionPanel" class="item-action-panel" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="item-action-handle"></div>
    <div class="item-action-header">
      <h3 id="itemActionTitle">Artikel</h3>
      <button id="itemActionClose" class="item-action-close" type="button" aria-label="Panel schließen">✕</button>
    </div>

    <div class="item-action-body">
      <div class="item-action-count-row">
        <button class="item-action-step" type="button" data-step="minus">−</button>
        <span id="itemActionCount" class="item-action-count">1</span>
        <button class="item-action-step" type="button" data-step="plus">+</button>
      </div>

      <label class="item-action-field">
        <span>Einheit</span>
        <select id="itemActionUnit"></select>
      </label>

      <label class="item-action-field">
        <span>In andere Liste verschieben</span>
        <select id="itemActionList"></select>
      </label>

      <button id="itemActionMoveBtn" class="item-action-move-btn" type="button">Verschieben</button>
    </div>
  </div>

  <!-- FLOATING DELETE BUTTON -->
  <button class="clear-done">Erledigte löschen</button>

  <!-- SETTINGS PANEL -->
  <div id="settingsPanel" class="settings-panel">
      <div class="settings-inner">
      <h2>Einstellungen</h2>

    <div class="form-row">
      <label for="themeSelect">Theme</label>
      <select id="themeSelect">
      <option value="default">Sanft & freundlich</option>
      <option value="forest">Wald & Natur</option>
      <option value="diablo">Diablo</option>
      <option value="blackfantasy">Black Fantasy</option>
      <option value="unicorn">Einhorn</option>
      <option value="coreblue">Coreblue</option>
    </select>
    </div>

    <div class="form-row">
      <label for="sizeSelect">Layout-Größe</label>
      <select id="sizeSelect">
      <option value="normal">Normal</option>
      <option value="large">Groß</option>
      <option value="xlarge">Extra groß</option>
    </select>
    </div>

    <hr class="settings-separator">

    <h3>Kategorien verwalten</h3>
    <div id="categoryEditor"></div>

    <div class="cat-editor-add">
      <input id="catInput" placeholder="Neue Kategorie">
      <button id="catAddBtn">Hinzufügen</button>
    </div>

    <hr class="settings-separator">

    <h3>Favoriten verwalten</h3>
    <div id="favoritesEditor"></div>

    <div class="fav-editor-add">
        <input id="favInput" placeholder="Neuer Favorit">
        <select id="favCategorySelect"></select>
        <button id="favAddBtn">Hinzufügen</button>
    </div>

    <button class="close-btn">Schließen</button>
      </div>
  </div>

  <div id="settingsBackdrop" class="settings-backdrop" aria-hidden="true"></div>

  <!-- JS -->
  <script type="module" src="assets/js/main.js"></script>

</body>
</html>
